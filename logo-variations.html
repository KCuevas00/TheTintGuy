<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logo Variations - The Tint Guy</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;900&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      background: var(--black);
      padding: 40px 20px;
      min-height: 100vh;
    }
    .showcase-header {
      text-align: center;
      margin-bottom: 60px;
    }
    .showcase-header h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      color: var(--white);
      letter-spacing: 4px;
      margin-bottom: 10px;
    }
    .showcase-header p {
      color: var(--mid);
      font-family: var(--font-cond);
      letter-spacing: 2px;
    }
    .logo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 30px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .logo-card {
      background: var(--dark);
      border: 1px solid #1f1f1f;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      position: relative;
      transition: border-color 0.3s;
    }
    .logo-card:hover {
      border-color: var(--accent);
    }
    .logo-number {
      position: absolute;
      top: 10px;
      left: 10px;
      font-family: var(--font-display);
      font-size: 0.9rem;
      color: var(--mid);
      letter-spacing: 2px;
    }
    
    /* Variation 1: Bold stacked with accent underline */
    .var-1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 3px;
      line-height: 1;
      text-align: center;
    }
    .var-1 .top { color: var(--white); display: block; }
    .var-1 .middle { color: var(--white); display: block; }
    .var-1 .bottom { 
      color: var(--accent); 
      display: block; 
      border-bottom: 3px solid var(--accent);
      padding-bottom: 2px;
    }
    
    /* Variation 2: Horizontal with icon integration */
    .var-2 {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: 2px;
    }
    .var-2 .icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: var(--white);
    }
    .var-2 span { color: var(--white); }
    .var-2 .highlight { color: var(--accent); }
    
    /* Variation 3: Monospace tech style */
    .var-3 {
      font-family: 'Barlow', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .var-3 .bracket { color: var(--accent); }
    .var-3 .text { color: var(--white); }
    .var-3 .dot { color: var(--mid); }
    
    /* Variation 4: Split color with vertical bar */
    .var-4 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
    }
    .var-4 .left { color: var(--white); }
    .var-4 .bar {
      width: 2px;
      height: 50px;
      background: var(--accent);
      margin: 0 12px;
    }
    .var-4 .right { color: var(--white); }
    .var-4 .accent { color: var(--accent); }
    
    /* Variation 5: Minimal outline style */
    .var-5 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 6px;
      color: var(--white);
      border: 2px solid var(--white);
      padding: 15px 30px;
      position: relative;
    }
    .var-5::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border: 2px solid var(--accent);
      transform: translate(4px, 4px);
      z-index: -1;
    }
    .var-5 .highlight { color: var(--accent); }
    
    /* Variation 6: Speed lines effect */
    .var-6 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 2.2rem;
      letter-spacing: 3px;
      color: var(--white);
      position: relative;
      text-transform: uppercase;
    }
    .var-6::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 50%;
      width: 15px;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }
    .var-6::after {
      content: '';
      position: absolute;
      right: -20px;
      top: 50%;
      width: 15px;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }
    .var-6 .highlight {
      color: var(--accent);
      text-shadow: 0 0 20px rgba(204, 34, 0, 0.5);
    }
    
    /* Variation 7: Glossy metallic effect */
    .var-7 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 4px;
      background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 50%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }
    .var-7 .highlight {
      background: linear-gradient(180deg, var(--accent) 0%, #ff4400 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .var-7::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    
    /* Variation 8: Racing stripe style */
    .var-8 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--white);
      position: relative;
      display: inline-block;
    }
    .var-8::before {
      content: '';
      position: absolute;
      left: -15px;
      top: 0;
      bottom: 0;
      width: 8px;
      background: var(--accent);
      transform: skewX(-20deg);
    }
    .var-8 .highlight {
      color: var(--accent);
      position: relative;
    }
    .var-8 .highlight::after {
      content: '';
      position: absolute;
      right: -12px;
      top: 0;
      bottom: 0;
      width: 8px;
      background: var(--accent);
      transform: skewX(-20deg);
    }
    
    /* Variation 9: Neon glow effect */
    .var-9 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.3rem;
      letter-spacing: 5px;
      color: var(--white);
      text-shadow: 
        0 0 5px rgba(255, 255, 255, 0.8),
        0 0 10px rgba(255, 255, 255, 0.6),
        0 0 20px rgba(255, 255, 255, 0.4);
    }
    .var-9 .highlight {
      color: var(--accent);
      text-shadow: 
        0 0 5px rgba(204, 34, 0, 0.8),
        0 0 10px rgba(204, 34, 0, 0.6),
        0 0 20px rgba(204, 34, 0, 0.4),
        0 0 40px rgba(204, 34, 0, 0.2);
    }
    
    /* Variation 10: Carbon fiber texture style */
    .var-10 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: 3px;
      color: var(--white);
      position: relative;
      padding: 10px 20px;
      background: linear-gradient(135deg, #1a1a1a 25%, #2a2a2a 25%, #2a2a2a 50%, #1a1a1a 50%, #1a1a1a 75%, #2a2a2a 75%);
      background-size: 4px 4px;
      border: 1px solid #333;
    }
    .var-10 .highlight {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="showcase-header">
    <h1>LOGO VARIATIONS</h1>
    <p>Choose your favorite navbar logo design</p>
  </div>
  
  <div class="logo-grid">
    <!-- Variation 1 -->
    <div class="logo-card">
      <span class="logo-number">01</span>
      <div class="var-1">
        <span class="top">THE</span>
        <span class="middle">TINT</span>
        <span class="bottom">GUY</span>
      </div>
    </div>
    
    <!-- Variation 2 -->
    <div class="logo-card">
      <span class="logo-number">02</span>
      <div class="var-2">
        <span class="icon">T</span>
        <span>THE <span class="highlight">TINT</span> GUY</span>
      </div>
    </div>
    
    <!-- Variation 3 -->
    <div class="logo-card">
      <span class="logo-number">03</span>
      <div class="var-3">
        <span class="bracket">&lt;</span>
        <span class="text">THE TINT GUY</span>
        <span class="bracket">/&gt;</span>
        <span class="dot">.</span>
      </div>
    </div>
    
    <!-- Variation 4 -->
    <div class="logo-card">
      <span class="logo-number">04</span>
      <div class="var-4">
        <span class="left">THE</span>
        <span class="bar"></span>
        <span class="right"><span class="accent">TINT</span> GUY</span>
      </div>
    </div>
    
    <!-- Variation 5 -->
    <div class="logo-card">
      <span class="logo-number">05</span>
      <div class="var-5">
        THE <span class="highlight">TINT</span> GUY
      </div>
    </div>
    
    <!-- Variation 6: Speed lines -->
    <div class="logo-card">
      <span class="logo-number">06</span>
      <div class="var-6">
        THE <span class="highlight">TINT</span> GUY
      </div>
    </div>
    
    <!-- Variation 7: Glossy metallic -->
    <div class="logo-card">
      <span class="logo-number">07</span>
      <div class="var-7">
        THE <span class="highlight">TINT</span> GUY
      </div>
    </div>
    
    <!-- Variation 8: Racing stripe -->
    <div class="logo-card">
      <span class="logo-number">08</span>
      <div class="var-8">
        THE <span class="highlight">TINT</span> GUY
      </div>
    </div>
    
    <!-- Variation 9: Neon glow -->
    <div class="logo-card">
      <span class="logo-number">09</span>
      <div class="var-9">
        THE <span class="highlight">TINT</span> GUY
      </div>
    </div>
    
    <!-- Variation 10: Carbon fiber -->
    <div class="logo-card">
      <span class="logo-number">10</span>
      <div class="var-10">
        THE <span class="highlight">TINT</span> GUY
      </div>
    </div>
  </div>
</body>
</html>
